name: Update links copy

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-links-copy.yml"

permissions:
  contents: write

jobs:
  update-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update descriptions
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('links.html')
          html = path.read_text(encoding='utf-8')
          old1 = '30年以上にわたり日本でクリケットの普及に取り組む松村謙一郎さんのサイト。情報発信、体験会、イベント、ポッドキャストなど幅広い活動を知ることができます。'
          new1 = '30年以上にわたり日本でクリケットの普及に取り組み、日本クリケット協会を立ち上げた初代理事長の松村謙一郎さんのサイト。'
          old2 = 'プラスチック製のバットやゴムボールを使い、ルール説明、ボウリング、バッティング、ミニゲームを体験できる初心者向け活動です。'
          new2 = '上記「松村謙一郎 クリケットWebサイト」内のページです。プラスチック製のバットやゴムボールを使い、ルール説明、ボウリング、バッティング、ミニゲームを体験できる初心者向け活動です。'
          if old1 not in html:
              raise RuntimeError('Matsumura description not found')
          if old2 not in html:
              raise RuntimeError('CrickeTRY description not found')
          html = html.replace(old1, new1, 1)
          html = html.replace(old2, new2, 1)
          path.write_text(html, encoding='utf-8')
          PY
      - name: Remove temporary workflow
        run: rm .github/workflows/update-links-copy.yml
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add links.html .github/workflows/update-links-copy.yml
          git commit -m "Revise link descriptions"
          git push
