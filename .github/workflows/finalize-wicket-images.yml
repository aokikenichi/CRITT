name: Finalize wicket images

on:
  push:
    branches: [main]
    paths:
      - "assets/finalize-wicket-images.ready"

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Switch HTML to JPEG files
        run: |
          set -e
          python - <<'PY'
          from pathlib import Path

          for filename in ['index.html', 'guide/index.html', 'guide/wicket.html']:
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              for i in range(1, 7):
                  text = text.replace(f'wicket-{i:02d}.svg', f'wicket-{i:02d}.jpg')
              path.write_text(text, encoding='utf-8')
          PY
          rm -f assets/wicket-01.svg assets/wicket-02.svg assets/wicket-03.svg assets/wicket-04.svg assets/wicket-05.svg assets/wicket-06.svg
          rm -f assets/finalize-wicket-images.ready
          rm -f .github/workflows/finalize-wicket-images.yml
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use uploaded wicket JPEG images" || exit 0
          git push
