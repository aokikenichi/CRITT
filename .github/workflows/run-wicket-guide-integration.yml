name: Run wicket guide integration

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/run-wicket-guide-integration.yml"

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Load prepared integration script
        run: |
          git fetch origin agent/add-cricket-guide-wicket:refs/remotes/origin/agent/add-cricket-guide-wicket
          git show origin/agent/add-cricket-guide-wicket:.github/workflows/add-wicket-guide.yml > /tmp/source-workflow.yml
          awk '
            /^      - name: Add guide pages and images$/ { found=1; next }
            found && /^        run: \|$/ { inrun=1; next }
            inrun && /^      - name:/ { exit }
            inrun { sub(/^          /, ""); print }
          ' /tmp/source-workflow.yml > /tmp/integrate.sh
          test -s /tmp/integrate.sh
          bash /tmp/integrate.sh
      - name: Remove temporary workflow and publish
        run: |
          rm .github/workflows/run-wicket-guide-integration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html guide assets/wicket-*.jpg .github/workflows/run-wicket-guide-integration.yml
          git commit -m "Add cricket guide wicket page"
          git push
